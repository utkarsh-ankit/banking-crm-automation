version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-banking-crm
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - ./n8n_data:/home/node/.n8n
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - GENERIC_TIMEZONE=America/Phoenix